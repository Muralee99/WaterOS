apiVersion: apps/v1
kind: Deployment
metadata:
  name: wateros-backend
  labels:
    app: wateros-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wateros-backend
  template:
    metadata:
      labels:
        app: wateros-backend
    spec:
      containers:
        - name: backend
          image: wateros-backend:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: wateros-secrets
                  key: database-url
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: wateros-secrets
                  key: redis-url
            - name: GOOGLE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: wateros-secrets
                  key: google-api-key
            - name: QDRANT_HOST
              value: "qdrant-service"
            - name: QDRANT_PORT
              value: "6333"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "1000m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: wateros-backend-service
spec:
  selector:
    app: wateros-backend
  ports:
    - port: 80
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: wateros-frontend
  labels:
    app: wateros-frontend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: wateros-frontend
  template:
    metadata:
      labels:
        app: wateros-frontend
    spec:
      containers:
        - name: frontend
          image: wateros-frontend:latest
          ports:
            - containerPort: 3000
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Service
metadata:
  name: wateros-frontend-service
spec:
  selector:
    app: wateros-frontend
  ports:
    - port: 80
      targetPort: 3000
  type: LoadBalancer
